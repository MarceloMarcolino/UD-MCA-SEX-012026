<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercícios CSS</title>
    <style>
        /* ===== Exercício 1: Seletores e cores ===== */
        .ex1-paragrafo {
            color: blue;
            text-align: center;
        }

        /* ===== Exercício 2: Classes ===== */
        .caixa1 {
            width: 200px;
            height: 200px;
            background-color: #e74c3c;
        }

        .caixa2 {
            width: 250px;
            height: 150px;
            background-color: #2ecc71;
        }

        .caixa3 {
            width: 150px;
            height: 250px;
            background-color: #3498db;
        }

        /* ===== Exercício 3: IDs e margens ===== */
        #box {
            width: 300px;
            height: 150px;
            background-color: yellow;
            margin: 20px;
        }

        /* ===== Exercício 4: Fontes e tamanhos ===== */
        .titulo-estilizado {
            font-family: Arial, sans-serif;
            font-size: 36px;
            color: purple;
        }

        /* ===== Exercício 5: Pseudo-classes ===== */
        .botao-hover {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .botao-hover:hover {
            background-color: #e74c3c;
        }
    </style>
</head>
<body>

    <!-- Exercício 1 -->
    <h2>Exercício 1: Seletores e cores</h2>
    <p class="ex1-paragrafo">Olá, mundo!</p>

    <hr>

    <!-- Exercício 2 -->
    <h2>Exercício 2: Classes</h2>
    <div class="caixa1"></div>
    <div class="caixa2"></div>
    <div class="caixa3"></div>

    <hr>

    <!-- Exercício 3 -->
    <h2>Exercício 3: IDs e margens</h2>
    <div id="box"></div>

    <hr>

    <!-- Exercício 4 -->
    <h2>Exercício 4: Fontes e tamanhos</h2>
    <h1 class="titulo-estilizado">Marcelo Antonio Pereira Marcolino</h1>

    <hr>

    <!-- Exercício 5 -->
    <h2>Exercício 5: Pseudo-classes</h2>
    <button class="botao-hover">Passe o mouse aqui</button>

</body>
</html>
